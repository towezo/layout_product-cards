<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Product cards</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="./styles/index.scss"
    />
  </head>
  <body>
    <div class="page">
      <article
        class="card"
        data-qa="card"
      >
        <div class="card__image"></div>
        <div class="card__body">
          <p class="card__category">Apple</p>
          <h1 class="card__title">APPLE A1419 iMac 27" Retina 5K Monoblock (MNED2UA/A)</h1>
          <p class="card__code">Product code: 195434</p>
          <div class="card__info">
            <div class="stars stars--4">
              <span class="stars__item"></span>
              <span class="stars__item"></span>
              <span class="stars__item"></span>
              <span class="stars__item"></span>
              <span class="stars__item"></span>
            </div>
            <p class="card__reviews">Reviews: 5</p>
          </div>
          <div class="card__footer">
            <div>
              <p class="card__price-label">Price:</p>
              <p class="card__price-value">$2,199</p
          <div class="card__footer">
            <div>
              <p class="card__price-label">Price:</p>
              <p class="card__price-value">$2,199</p>
            </div>
            <a
              class="card__buy"
              href="#"
              data-qa="hover"
            >
              BUY
            </a>
          </div>
        </div>
      </article>
    </div>
  </body>
</html>
